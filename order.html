<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل الطلب</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="logo.png">
</head>

<body>

    <div class="container">
        <h1>تفاصيل الطلب</h1>
        <p class="subtitle">إرسال الطلب للكابتن</p>

        <label for="restaurantName">اسم المطعم</label>
        <input type="text" id="restaurantName">

        <label for="area">المنطقة</label>
        <input id="area" readonly>

        <label for="fee">رسوم التوصيل</label>
        <input id="fee" readonly>

        <label for="foodPrice">سعر الطلب (الأكل)</label>
        <input type="number" id="foodPrice" placeholder="0.00" oninput="calculateTotal()">

        <label for="totalPrice">الإجمالي (شامل التوصيل)</label>
        <input id="totalPrice" readonly>

        <label for="orderDetails">تفاصيل الطلب</label>
        <textarea id="orderDetails" placeholder="مثال: 2 شاورما + بطاطا"></textarea>

        <label for="customerPhone">رقم هاتف الزبون</label>
        <input type="tel" id="customerPhone" placeholder="07xxxxxxxx" maxlength="10"
            oninput="this.value = this.value.replace(/[^0-9]/g, '')">

        <button onclick="sendWhatsAppApp()"
            style="margin-top: 1rem; width: 100%; font-size: 1.1rem; padding: 12px; background-color: #25D366; color: white; border: none; border-radius: 8px; cursor: pointer;">إرسال
            الطلب عبر واتساب</button>
    </div>

    <script src="order.js"></script>
</body>

</html>
